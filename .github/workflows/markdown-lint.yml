name: Lint Markdown
on:
  push:
    branches: [ main ]
    paths: [ '**.md', 'README.md' ]
  pull_request:
    branches: [ main ]
    paths: [ '**.md', 'README.md' ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v13
        with:
          globs: |
            README.md
            docs/**/*.md
            config: |
          MD013:
            line_length: 120
