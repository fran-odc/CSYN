name: Lint Markdown (Portfolio)
on:
  push:
    branches: [ main ]
    paths: [ '**.md', 'README.md' ]
  pull_request:
    branches: [ main ]
    paths: [ '**.md', 'README.md' ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown (tolérant)
        uses: DavidAnson/markdownlint-cli2-action@v22
        continue-on-error: true
        with:
          globs: |
            README.md
            docs/**/*.md
          args: "--disable MD013,MD025,MD041,MD032,MD022,MD009,MD004,MD012,MD007,MD034,MD042,MD036"
